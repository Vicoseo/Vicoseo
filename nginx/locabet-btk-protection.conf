# BTK Bot Protection - Include in nginx site configs for locabet domains
# Usage: include /etc/nginx/locabet-btk-protection.conf;
#
# Prerequisites:
# 1. Copy btk-blocklist.conf to /etc/nginx/btk-blocklist.conf
# 2. Add this to nginx http block (nginx.conf):
#
#    geo $is_suspicious {
#        default 0;
#        include /etc/nginx/btk-blocklist.conf;
#    }
#
#    map $is_suspicious $sanitize_header {
#        0 "";
#        1 "true";
#    }
#
# 3. In each locabet server block, add:
#    proxy_set_header X-Sanitize-Content $sanitize_header;

# Block empty/suspicious user agents at nginx level
if ($http_user_agent = "") {
    return 444;
}

if ($http_user_agent ~* "(python|curl|wget|scrapy|PhantomJS|java/)") {
    set $sanitize_header "true";
}

# Pass sanitize header to Next.js
proxy_set_header X-Sanitize-Content $sanitize_header;
