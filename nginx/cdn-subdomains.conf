# CDN Subdomain Configuration
# Serves static files from cdn.* subdomains for all 18 sites
# Deploy to: /etc/nginx/conf.d/cdn-subdomains.conf

server {
    listen 443 ssl http2;
    server_name ~^cdn\.(.+)$;

    # SSL - Cloudflare Origin Certificate (Full SSL mode)
    ssl_certificate     /etc/nginx/ssl/cdn-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cdn-origin-key.pem;

    # CORS headers for fonts, CSS, etc.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Security: deny hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # /storage/ - Backend uploaded files (logos, images, promotions)
    location /storage/ {
        alias /var/www/multi-tenant-cms/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;

        # Only serve static file types
        location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|css|js|woff|woff2|ttf|eot|mp4|pdf)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
        }
    }

    # /_next/static/ - Next.js build assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Generic static file types - proxy to Next.js
    location ~* \.(css|js|png|jpg|jpeg|webp|avif|svg|gif|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Everything else returns 404 (CDN should not serve HTML/API)
    location / {
        return 404;
    }
}

# HTTP to HTTPS redirect for CDN subdomains
server {
    listen 80;
    server_name ~^cdn\.(.+)$;
    return 301 https://$host$request_uri;
}
