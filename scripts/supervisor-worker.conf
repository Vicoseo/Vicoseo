[program:cms-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/multi-tenant-cms/backend/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/multi-tenant-cms/backend/storage/logs/worker.log
